<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conferma il tuo indirizzo email</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f4f4f4; padding: 32px;">
  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 8px; padding: 40px;">
          <tr>
            <td align="center" style="padding-bottom: 24px;">
              <h1 style="color: #1a1a1a; font-size: 24px; margin: 0;">Youvolution Academy</h1>
            </td>
          </tr>
          <tr>
            <td style="color: #444; font-size: 16px; line-height: 1.6;">
              <p>Ciao,</p>
              <p>grazie per esserti registrato su <strong>Youvolution Academy</strong>. Clicca il pulsante qui sotto per confermare il tuo indirizzo email e attivare il tuo account.</p>
              <p style="text-align: center; margin: 32px 0;">
                <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=email"
                   style="background: #0f766e; color: #ffffff; text-decoration: none; padding: 14px 28px; border-radius: 6px; font-size: 16px; font-weight: bold;">
                  Conferma email
                </a>
              </p>
              <p style="font-size: 14px; color: #888;">Se non hai creato un account, puoi ignorare questa email.</p>
              <p style="font-size: 14px; color: #888;">Il link scade dopo <strong>24 ore</strong>.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
